<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gestão Blyss</title>


<body>
    <h1>Gestão Blyss</h1>
    <h2>Home</h2>
    <form>
        <p>Bem Vindo a Tela de Cadastro da Gestão Blyss</p>
        <p>
            <lable for="nome_completo">Nome Completo:</lable>
            <input id="nome_completo" type="text">
        </p>
        <p>
            <lable for="email">Email:</lable>
            <input id="email" type="email">
        </p>
        <p>
            <lable for="telefone">Telefone:</lable>
            <input id="telefone" type="tel">
        </p>
        <p>
            <lable for="senha">Senha:</lable>
            <input id="senha" type="password">
        </p>
        <p>
            <lable for="confirmar_senha">Confirmar Senha:</lable>
            <input id="confirmar_senha" type="password">
        </p>
        <p>
            <button type="reset">Limpar</button>
            <button type="submit">Cadastrar</button>
    </form>

    <hr>

</body>
</head>

</html>
